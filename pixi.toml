[project]
name = "bayes-om"
version = "1.2.0"
description = "How Bayes' theorem is able to determine the polarity of a message?"
authors = ["Alexandre Roulois <alexandre.roulois@irif.fr>"]
license-file = "LICENSE"
readme = "README.md"
repository = "https://github.com/Alex-bzh/highschool-sentiment-bayes"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[tasks]
start = "jupyter lab"

[dependencies]
python = "3.12.*"
jupyterlab = ">=4.0,<5"
jupyterlab-latex = "*"
matplotlib = ">=3.9,<4"
numpy = ">=2.0,<3"
pandas = ">=2.2,<3"
seaborn = ">=0.13,<0.14"
